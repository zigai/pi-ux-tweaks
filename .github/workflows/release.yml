name: Release

on:
  push:
    tags:
      - "@zigai/pi-*@*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      package:
        description: Workspace package name to publish, for example @zigai/pi-tree
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Select package
        id: package
        env:
          INPUT_PACKAGE: ${{ inputs.package }}
        run: |
          if [ -n "$INPUT_PACKAGE" ]; then
            package="$INPUT_PACKAGE"
          else
            tag="${{ github.event.release.tag_name || github.ref_name }}"
            package="${tag%@*}"
          fi

          if [ -z "$package" ]; then
            echo "Could not determine package to publish" >&2
            exit 1
          fi

          echo "name=$package" >> "$GITHUB_OUTPUT"

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish -w '${{ steps.package.outputs.name }}' --access public --provenance
